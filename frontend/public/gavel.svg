<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Gavel Base / Block -->
  <path d="M420 380 Q450 350 480 380 Q450 410 420 380 Z" fill="#8B4513"/>
  <path d="M120 400 L400 350 L420 380 L140 430 Z" fill="#654321"/>
  
  <!-- Handle -->
  <path d="M50 450 L300 250" stroke="#8B4513" stroke-width="24" stroke-linecap="round"/>
  <path d="M40 460 L290 260" stroke="#5C3A21" stroke-width="12" stroke-linecap="round"/>
  
  <!-- Gavel Head (Hammer) -->
  <rect x="250" y="150" width="160" height="90" rx="10" transform="rotate(-38 250 150)" fill="#8B4513"/>
  <!-- Gold Rings -->
  <rect x="270" y="130" width="18" height="90" transform="rotate(-38 270 130)" fill="#DAA520"/>
  <rect x="360" y="60" width="18" height="90" transform="rotate(-38 360 60)" fill="#DAA520"/>
  
  <!-- Head ends -->
  <circle cx="250" cy="190" r="45" fill="#654321"/>
  <circle cx="410" cy="65" r="45" fill="#654321"/>
  <!-- Highlights -->
  <path d="M100 400 L250 280" stroke="#A0522D" stroke-width="6" stroke-linecap="round"/>
</svg>
